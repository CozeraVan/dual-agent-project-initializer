name: Bug Report
description: Report a problem with initialization, generated files, or workflow checks.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "python --version"
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots

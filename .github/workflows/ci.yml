name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: Compile standalone release script
        run: python scripts/compile_release.py

      - name: Smoke test standalone release script
        run: python dist/init-agent-project.py .ci-smoke-project --no-git-commit
